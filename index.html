<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myco-Vent 6-Week Project Gantt Chart</title>
  <style>
    :root {
      --bg: #f7f5f0;
      --navy: #17324d;
      --blue: #eaf4f7;
      --sage: #edf5ec;
      --text: #1f1f1f;
      --muted: #66727d;
      --border: #7c93a0;
      --accent: #3b6b4d;
      --shadow: rgba(23,50,77,0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 28px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      max-width: 1240px;
      margin: 0 auto;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(23,50,77,0.16);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
    }

    .header {
      background: var(--navy);
      color: #fff;
      padding: 18px 22px;
    }

    .header h1 {
      margin: 0 0 5px 0;
      font-size: 28px;
      line-height: 1.15;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      color: rgba(255,255,255,0.82);
      line-height: 1.4;
    }

    .content {
      padding: 18px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      margin-bottom: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      display: inline-block;
      border: 1px solid rgba(23,50,77,0.18);
    }

    .table-scroll {
      overflow-x: auto;
      border: 1px solid rgba(124,147,160,0.45);
      border-radius: 4px;
      background: rgba(255,255,255,0.78);
    }

    table {
      width: 100%;
      min-width: 1100px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      background: var(--navy);
      color: #ffffff;
      font-weight: 700;
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      border-right: 1px solid rgba(255,255,255,0.12);
      font-size: 14px;
    }

    thead th:last-child,
    tbody td:last-child {
      border-right: none;
    }

    tbody td {
      border-bottom: 1px solid rgba(124,147,160,0.28);
      border-right: 1px solid rgba(124,147,160,0.18);
      padding: 12px 10px;
      vertical-align: top;
      font-size: 14px;
    }

    tbody tr:nth-child(odd) td.task {
      background: var(--blue);
    }

    tbody tr:nth-child(even) td.task {
      background: var(--sage);
    }

    tbody tr:nth-child(odd) td.owner {
      background: rgba(234,244,247,0.45);
    }

    tbody tr:nth-child(even) td.owner {
      background: rgba(237,245,236,0.45);
    }

    td.task { width: 290px; }

    td.owner {
      width: 170px;
      font-weight: bold;
    }

    td.week {
      width: 110px;
      text-align: center;
      vertical-align: middle;
    }

    .bar {
      display: block;
      padding: 6px 0;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      color: #17324d;
      border: 1px solid rgba(23,50,77,0.16);
      background: rgba(255,255,255,0.6);
    }

    .b1 { background: #eaf4f7; }
    .b2 { background: #edf5ec; }
    .b3 { background: #e5edf0; }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 4px;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .note strong { color: var(--navy); }
  </style>
</head>

      <h1>Myco-Vent — 6 Week Gantt Chart</h1>
      <p>Imperial Science in Medicine project timeline</p>
    </div>
